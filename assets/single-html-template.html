<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coze 单页验证工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6faf8;
      --panel: #ffffff;
      --ink: #18212f;
      --muted: #667085;
      --line: #dbe7e2;
      --accent: #44b88d;
      --accent-2: #84a7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 24px; }
    h2 { font-size: 16px; }
    label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 13px; }
    input, textarea, button {
      width: 100%;
      font: inherit;
      border-radius: 8px;
    }
    input, textarea {
      border: 1px solid var(--line);
      padding: 12px;
      background: #fbfdfc;
      color: var(--ink);
    }
    textarea { min-height: 140px; resize: vertical; }
    button {
      margin-top: 14px;
      border: 0;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #08121f;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: wait; }
    .result {
      min-height: 520px;
      white-space: normal;
      line-height: 1.72;
    }
    .result table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    .result th, .result td {
      border: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
    }
    .status { color: var(--muted); font-size: 13px; margin-top: 10px; }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Coze 单页验证工具</h1>
      <label for="primaryInput">主要输入</label>
      <textarea id="primaryInput" placeholder="粘贴要发给智能体或工作流的内容"></textarea>
      <label for="fileInput">附件</label>
      <input id="fileInput" type="file" multiple>
      <button id="sendBtn">发送给 Coze</button>
      <div class="status" id="status">等待输入</div>
    </section>
    <section>
      <h2>输出结果</h2>
      <div class="result" id="result"></div>
    </section>
  </main>

  <script>
    const apiUrl = "https://api.coze.cn/v3/chat?";
    const fileApiUrl = "https://api.coze.cn/v1/files/upload";
    const cozeToken = "PASTE_USER_PAT_HERE";
    const botId = "PASTE_BOT_ID_HERE";
    const userId = "local_html_test_user";

    const input = document.querySelector("#primaryInput");
    const fileInput = document.querySelector("#fileInput");
    const sendBtn = document.querySelector("#sendBtn");
    const statusEl = document.querySelector("#status");
    const resultEl = document.querySelector("#result");

    sendBtn.addEventListener("click", async () => {
      sendBtn.disabled = true;
      resultEl.innerHTML = "";
      setStatus("正在调用...");
      try {
        const uploaded = await uploadFiles([...fileInput.files]);
        const content = buildContent(input.value.trim(), uploaded);
        await chat(content, uploaded.length ? "object_string" : "text");
        setStatus("完成");
      } catch (error) {
        setStatus(error.message || String(error));
      } finally {
        sendBtn.disabled = false;
      }
    });

    async function uploadFiles(files) {
      const out = [];
      for (const file of files) {
        const form = new FormData();
        form.append("file", file, file.name);
        const response = await fetch(fileApiUrl, {
          method: "POST",
          headers: { Authorization: `Bearer ${cozeToken}` },
          body: form
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.code) throw new Error(data.msg || "文件上传失败");
        out.push({ type: "file", file_id: data.data.id });
      }
      return out;
    }

    function buildContent(text, files) {
      if (!files.length) return text;
      return JSON.stringify([{ type: "text", text }, ...files]);
    }

    async function chat(content, contentType) {
      const response = await fetch(apiUrl, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${cozeToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          bot_id: botId,
          user_id: userId,
          stream: true,
          additional_messages: [{
            role: "user",
            type: "question",
            content,
            content_type: contentType
          }],
          parameters: {}
        })
      });
      if (!response.ok || !response.body) throw new Error("Coze 对话接口调用失败");
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";
        for (const part of parts) appendAnswerFromEvent(part);
      }
    }

    function appendAnswerFromEvent(eventText) {
      const dataLine = eventText.split("\n").find(line => line.startsWith("data:"));
      if (!dataLine) return;
      const raw = dataLine.slice(5).trim();
      if (!raw || raw === "[DONE]") return;
      try {
        const data = JSON.parse(raw);
        if (/finish|done|complete/i.test(data.event || data.msg_type || data.type || "")) return;
        const delta = data.content || data.delta || data.answer || data.data?.content || "";
        if (delta) resultEl.innerHTML = renderMarkdown(resultEl.dataset.raw = (resultEl.dataset.raw || "") + delta);
      } catch {
        // Ignore malformed non-answer events.
      }
    }

    function renderMarkdown(text) {
      return escapeHtml(text)
        .replace(/^### (.*)$/gm, "<h3>$1</h3>")
        .replace(/^## (.*)$/gm, "<h2>$1</h2>")
        .replace(/^# (.*)$/gm, "<h1>$1</h1>")
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/^\s*[-*]\s+(.*)$/gm, "<li>$1</li>")
        .replace(/\n/g, "<br>");
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }
  </script>
</body>
</html>
