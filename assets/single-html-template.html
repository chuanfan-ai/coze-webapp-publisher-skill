<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coze 单页验证工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6faf8;
      --panel: #ffffff;
      --ink: #18212f;
      --muted: #667085;
      --line: #dbe7e2;
      --accent: #44b88d;
      --accent-2: #84a7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 24px; }
    h2 { font-size: 16px; }
    label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: 13px; }
    input, textarea, button {
      width: 100%;
      font: inherit;
      border-radius: 8px;
    }
    input, textarea {
      border: 1px solid var(--line);
      padding: 12px;
      background: #fbfdfc;
      color: var(--ink);
    }
    textarea { min-height: 140px; resize: vertical; }
    button {
      margin-top: 14px;
      border: 0;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #08121f;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: .55; cursor: wait; }
    .result {
      min-height: 520px;
      white-space: normal;
      line-height: 1.72;
    }
    .result h1, .result h2, .result h3 { margin: 18px 0 10px; }
    .result p { margin: 10px 0; }
    .result ul, .result ol { padding-left: 1.4em; }
    .result blockquote {
      margin: 12px 0;
      padding: 8px 12px;
      border-left: 3px solid var(--accent);
      background: #f2faf6;
      color: #334155;
    }
    .result pre {
      overflow-x: auto;
      padding: 12px;
      border-radius: 8px;
      background: #101828;
      color: #f8fafc;
    }
    .result code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #eef4f1;
    }
    .result pre code {
      padding: 0;
      background: transparent;
    }
    .result table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    .result th, .result td {
      border: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
    }
    .result img,
    .result video {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 12px 0;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
    }
    .result audio {
      display: block;
      width: 100%;
      margin: 12px 0;
    }
    .result a { color: #2563eb; }
    .status { color: var(--muted); font-size: 13px; margin-top: 10px; }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Coze 单页验证工具</h1>
      <label for="primaryInput">主要输入</label>
      <textarea id="primaryInput" placeholder="粘贴要发给智能体或工作流的内容"></textarea>
      <label for="fileInput">附件</label>
      <input id="fileInput" type="file" multiple>
      <button id="sendBtn">发送给 Coze</button>
      <div class="status" id="status">等待输入</div>
    </section>
    <section>
      <h2>输出结果</h2>
      <div class="result" id="result"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script>
    const apiUrl = "https://api.coze.cn/v3/chat?";
    const fileApiUrl = "https://api.coze.cn/v1/files/upload";
    const cozeToken = "PASTE_USER_PAT_HERE";
    const botId = "PASTE_BOT_ID_HERE";
    const userId = "local_html_test_user";

    const input = document.querySelector("#primaryInput");
    const fileInput = document.querySelector("#fileInput");
    const sendBtn = document.querySelector("#sendBtn");
    const statusEl = document.querySelector("#status");
    const resultEl = document.querySelector("#result");

    sendBtn.addEventListener("click", async () => {
      sendBtn.disabled = true;
      resultEl.innerHTML = "";
      setStatus("正在调用...");
      try {
        const uploaded = await uploadFiles([...fileInput.files]);
        const content = buildContent(input.value.trim(), uploaded);
        await chat(content, uploaded.length ? "object_string" : "text");
        setStatus("完成");
      } catch (error) {
        setStatus(error.message || String(error));
      } finally {
        sendBtn.disabled = false;
      }
    });

    async function uploadFiles(files) {
      const out = [];
      for (const file of files) {
        const form = new FormData();
        form.append("file", file, file.name);
        const response = await fetch(fileApiUrl, {
          method: "POST",
          headers: { Authorization: `Bearer ${cozeToken}` },
          body: form
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.code) throw new Error(data.msg || "文件上传失败");
        out.push({ type: "file", file_id: data.data.id });
      }
      return out;
    }

    function buildContent(text, files) {
      if (!files.length) return text;
      return JSON.stringify([{ type: "text", text }, ...files]);
    }

    async function chat(content, contentType) {
      const response = await fetch(apiUrl, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${cozeToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          bot_id: botId,
          user_id: userId,
          stream: true,
          additional_messages: [{
            role: "user",
            type: "question",
            content,
            content_type: contentType
          }],
          parameters: {}
        })
      });
      if (!response.ok || !response.body) throw new Error("Coze 对话接口调用失败");
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n\n");
        buffer = parts.pop() || "";
        for (const part of parts) appendAnswerFromEvent(part);
      }
    }

    function appendAnswerFromEvent(eventText) {
      const dataLine = eventText.split("\n").find(line => line.startsWith("data:"));
      if (!dataLine) return;
      const raw = dataLine.slice(5).trim();
      if (!raw || raw === "[DONE]") return;
      try {
        const data = JSON.parse(raw);
        if (/finish|done|complete/i.test(data.event || data.msg_type || data.type || "")) return;
        const delta = data.content || data.delta || data.answer || data.data?.content || "";
        if (delta) renderAnswer(resultEl.dataset.raw = (resultEl.dataset.raw || "") + delta);
      } catch {
        // Ignore malformed non-answer events.
      }
    }

    function renderAnswer(markdown) {
      resultEl.innerHTML = renderMarkdown(markdown);
      enhanceRenderedMedia(resultEl);
    }

    function renderMarkdown(text) {
      const prepared = preprocessMarkdownMedia(text);
      if (!window.marked || !window.DOMPurify) {
        return `<pre>${escapeHtml(prepared)}</pre>`;
      }
      marked.setOptions({ gfm: true, breaks: true });
      const html = marked.parse(prepared);
      return DOMPurify.sanitize(html, {
        ADD_TAGS: ["video", "audio", "source"],
        ADD_ATTR: ["controls", "src", "type", "poster", "preload", "playsinline", "loading", "decoding", "target", "rel"],
        ALLOW_DATA_ATTR: false
      });
    }

    function preprocessMarkdownMedia(markdown) {
      return markdown
        .replace(/!?\[(video|audio)(?:\|([^\]]+))?\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/gi, mediaTokenToHtml)
        .replace(/@\[(video|audio)(?:\|([^\]]+))?\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/gi, mediaTokenToHtml);
    }

    function mediaTokenToHtml(match, kind, label, url, title) {
      const src = normalizeMediaUrl(url);
      if (!src) return escapeHtml(match);
      const safeTitle = escapeHtml(title || label || kind);
      if (kind.toLowerCase() === "audio") {
        return `<audio controls preload="metadata" src="${escapeHtml(src)}">${safeTitle}</audio>`;
      }
      return `<video controls preload="metadata" playsinline src="${escapeHtml(src)}">${safeTitle}</video>`;
    }

    function enhanceRenderedMedia(root) {
      root.querySelectorAll("a[href]").forEach((link) => {
        const href = link.getAttribute("href") || "";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        if (isVideoUrl(href)) link.replaceWith(createMediaElement("video", href, link.textContent));
        if (isAudioUrl(href)) link.replaceWith(createMediaElement("audio", href, link.textContent));
      });
      root.querySelectorAll("img").forEach((image) => {
        image.loading = "lazy";
        image.decoding = "async";
      });
    }

    function createMediaElement(kind, url, label) {
      const element = document.createElement(kind);
      element.controls = true;
      element.preload = "metadata";
      element.src = normalizeMediaUrl(url);
      element.textContent = label || url;
      if (kind === "video") element.setAttribute("playsinline", "");
      return element;
    }

    function normalizeMediaUrl(url) {
      try {
        const parsed = new URL(url, window.location.href);
        if (!["http:", "https:", "blob:"].includes(parsed.protocol)) return "";
        return parsed.href;
      } catch {
        return "";
      }
    }

    function isVideoUrl(url) {
      return /\.(mp4|webm|ogg|mov|m4v)(\?.*)?$/i.test(url);
    }

    function isAudioUrl(url) {
      return /\.(mp3|wav|ogg|m4a|aac|flac)(\?.*)?$/i.test(url);
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }
  </script>
</body>
</html>
